services:

  dashboard:
    build: .
    container_name: bloomdirect_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
      - ./dashboard:/app/dashboard
      - ./agents:/app/agents
      - ./orchestrator:/app/orchestrator
      - ./scheduler:/app/scheduler
      - ./guardrails:/app/guardrails
      - ./mcp_servers:/app/mcp_servers
      - ./config:/app/config
      - ./database:/app/database
      - ./scripts:/app/scripts
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////app/data/bloomdirect.db
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - scheduler

  scheduler:
    build: .
    container_name: bloomdirect_scheduler
    command: ["python", "scheduler/scheduler.py"]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'print(1)' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
      - ./agents:/app/agents
      - ./orchestrator:/app/orchestrator
      - ./scheduler:/app/scheduler
      - ./guardrails:/app/guardrails
      - ./mcp_servers:/app/mcp_servers
      - ./config:/app/config
      - ./database:/app/database
      - ./scripts:/app/scripts
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////app/data/bloomdirect.db
    env_file:
      - .env
    restart: unless-stopped
