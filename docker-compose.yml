services:

  dashboard:
    build: .
    container_name: bloomdirect_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
      - ./dashboard:/app/dashboard
      - ./agents:/app/agents
      - ./orchestrator:/app/orchestrator
      - ./scheduler:/app/scheduler
      - ./guardrails:/app/guardrails
      - ./mcp_servers:/app/mcp_servers
      - ./config:/app/config
      - ./database:/app/database
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    depends_on:
      - scheduler

  scheduler:
    build: .
    container_name: bloomdirect_scheduler
    command: ["python", "scheduler/scheduler.py"]
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
      - ./dashboard:/app/dashboard
      - ./agents:/app/agents
      - ./orchestrator:/app/orchestrator
      - ./scheduler:/app/scheduler
      - ./guardrails:/app/guardrails
      - ./mcp_servers:/app/mcp_servers
      - ./config:/app/config
      - ./database:/app/database
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
